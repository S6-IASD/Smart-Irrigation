# .github/workflows/backend-ci.yml
name: Backend CI — Smart Irrigation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: Tests pytest
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: smart_irrigation_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_NAME: smart_irrigation_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          SECRET_KEY: test-secret-key-ci-only
          DEBUG: "True"
        run: |
          cd backend
          python manage.py migrate

      - name: Run pytest + coverage
        env:
          DB_HOST: localhost
          DB_NAME: smart_irrigation_db
          DB_USER: postgres
          DB_PASSWORD: postgres
          SECRET_KEY: test-secret-key-ci-only
          DEBUG: "True"
        run: |
          cd backend
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

      - name:  Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: pytest        # ← attend que pytest passe

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image
        run: |
          cd backend
          docker build -t smart-irrigation-backend .

      - name:  Image OK
        run: echo "Image Docker construite avec succès"