version: '3.8'

networks:
  smart_network:
    driver: bridge

services:

  # ── PostgreSQL Database ─────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: smart_irrigation_db
    restart: unless-stopped
    networks:
      - smart_network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: smart_irrigation_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_irrigation_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Django Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smart_irrigation_backend
    restart: unless-stopped
    networks:
      - smart_network
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120 --access-logfile - --log-level info"
    volumes:
      - ./backend:/app
      - ./backend/models:/models
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_NAME: smart_irrigation_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      DEBUG: "False"
      DJANGO_SETTINGS_MODULE: config.settings
      SECRET_KEY: django-insecure-_i^cwn2fl)lnxnao38rffk=e%n$$(ep8u^4kjt@wv92wj2h1
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend,0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python manage.py check --deploy 2>/dev/null || exit 0"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s

  # ── React Frontend (Nginx) ──────────────────────────────────────────────
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    container_name: smart_irrigation_frontend
    restart: unless-stopped
    networks:
      - smart_network
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_volume:
